#######################
### Hyprland Config ###
#######################

# PATHS
$hl = ~/.config/hypr/land

# CONFIGS
source = $hl/animations.conf
source = $hl/apps.conf
source = $hl/autostart.conf
source = $hl/colors.conf
source = $hl/cursor.conf
source = $hl/decoration.conf
source = $hl/env.conf
source = $hl/group.conf
source = $hl/input.conf
source = $hl/keybinds.conf
source = $hl/misc.conf
source = $hl/monitors.conf
source = $hl/window_rules.conf
source = $hl/workspace_rules.conf

general {
    gaps_in = 4
    gaps_out = 4
    float_gaps = 12

    border_size = 2

	col.active_border = $primary_accent
    col.inactive_border = $border_grey

    resize_on_border = false
    allow_tearing = false

    layout = dwindle

	snap {
		enabled = true
		respect_gaps = true
	}
}

# Layouts
dwindle {
    pseudotile = true
    force_split = 0
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
	new_status = master
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.5
    focus_fit_method = 1
    follow_focus = true
    follow_min_visible = 0.4
    explicit_column_widths = 0.333,0.5,0.667,1.0
    direction = right
}
