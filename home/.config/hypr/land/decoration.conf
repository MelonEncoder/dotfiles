# https://wiki.hypr.land/Configuring/Variables/#decoration

decoration {
    rounding = 8
    rounding_power = 4

    active_opacity = 1.0
    inactive_opacity = 1.0

    # screen_shader = ~/.config/hypr/shaders/example.frag
    # screen_shader = ~/.config/hypr/shaders/crt.frag

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }

	shadow {
		enabled = true
		scale = 1
		range = 20
		render_power = 3
		offset = 0, 0
		color = $shadow_black
	}
}
